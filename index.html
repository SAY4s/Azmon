<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرکز آموزشی خوارزمی</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #1a5f7a;
            --secondary-color: #159895;
            --accent-color: #ffc107;
            --dark-color: #2c3e50;
            --gradient-primary: linear-gradient(135deg, var(--primary-color), #159895, #57c4b0);
            --gradient-icdl: linear-gradient(135deg, #2196F3, #1976D2);
            --gradient-diplom: linear-gradient(135deg, #9C27B0, #7B1FA2);
            --box-shadow: 0 0.2vw 0.5vw rgba(0, 0, 0, 0.05);
            --box-shadow-hover: 0 0.3vw 0.8vw rgba(0, 0, 0, 0.15);
            --transition: all 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(0.8vw); }
            to { opacity: 1; transform: translateY(0); }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Vazir', 'Tanha', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            color: #333;
            line-height: 1.3;
            min-height: 100vh;
            animation: fadeIn 0.5s ease-out;
            overflow-x: hidden;
            font-size: 1.2vw;
        }

        .container {
            width: 100vw;
            min-height: 100vh;
            margin: 0 auto;
            padding: 0.6vw;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background: var(--gradient-primary);
            color: white;
            padding: 1.4vw 0;
            text-align: center;
            box-shadow: var(--box-shadow);
            margin-bottom: 2vw;
            border-radius: 0 0 0.8vw 0.8vw;
            width: 100%;
        }

        header h1 {
            font-size: 1.8vw;
            font-weight: 700;
            margin-bottom: 0.4vw;
        }

        header p {
            font-size: 1vw;
            opacity: 0.9;
        }

        .main-menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
            padding: 1vw;
        }

        .exam-info {
            background: white;
            border-radius: 0.8vw;
            padding: 2vw;
            box-shadow: var(--box-shadow);
            margin-bottom: 2vw;
            width: 60vw;
            max-width: 95vw;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
            border-left: 0.3vw solid var(--primary-color);
        }

        .exam-info h2 {
            color: var(--primary-color);
            margin-bottom: 0.8vw;
            padding-bottom: 0.6vw;
            border-bottom: 0.1vw solid var(--accent-color);
            font-size: 1.6vw;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6vw;
        }

        .exam-info p {
            font-size: 1.1vw;
            color: #666;
        }

        .exam-buttons {
            display: flex;
            gap: 2vw;
            flex-wrap: wrap;
            justify-content: center;
            width: 60vw;
            max-width: 95vw;
        }

        .exam-btn {
            flex: 1;
            min-width: 18vw;
            color: white;
            border: none;
            padding: 2.2vw 1.5vw;
            border-radius: 0.8vw;
            cursor: pointer;
            font-size: 1.3vw;
            font-weight: 700;
            transition: var(--transition);
            box-shadow: var(--box-shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.8vw;
            text-decoration: none;
        }

        .exam-btn i {
            font-size: 2.4vw;
        }

        .exam-btn span.sub {
            font-size: 0.85vw;
            font-weight: 400;
            opacity: 0.9;
        }

        .exam-btn:hover {
            transform: translateY(-0.3vw);
            box-shadow: var(--box-shadow-hover);
        }

        .icdl-btn {
            background: var(--gradient-icdl);
        }

        .diplom-btn {
            background: var(--gradient-diplom);
        }

        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
            padding: 1vw;
        }

        .login-box {
            background: white;
            padding: 2vw 2.5vw;
            border-radius: 0.8vw;
            box-shadow: var(--box-shadow);
            width: 100%;
            max-width: 28vw;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
            border-left: 0.3vw solid var(--primary-color);
        }

        .login-box h2 {
            color: var(--primary-color);
            margin-bottom: 1vw;
            font-size: 1.4vw;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5vw;
        }

        .login-box p {
            font-size: 0.95vw;
            color: #666;
            margin-bottom: 1vw;
        }

        .login-box input {
            width: 100%;
            padding: 0.7vw;
            margin-bottom: 0.8vw;
            border: 1px solid #e0e0e0;
            border-radius: 0.4vw;
            font-size: 1vw;
            transition: var(--transition);
            text-align: center;
        }

        .login-box input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.15vw rgba(26, 95, 122, 0.2);
            outline: none;
        }

        .login-box button {
            width: 100%;
            background: var(--gradient-primary);
            color: white;
            border: none;
            padding: 0.7vw;
            border-radius: 0.4vw;
            cursor: pointer;
            font-size: 1vw;
            font-weight: 600;
            transition: var(--transition);
        }

        .login-box button:hover {
            transform: translateY(-0.1vw);
            box-shadow: var(--box-shadow-hover);
        }

        .login-message {
            margin-top: 0.8vw;
            font-weight: 600;
            min-height: 1.4vw;
            font-size: 0.9vw;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-0.5vw); }
            20%, 40%, 60%, 80% { transform: translateX(0.5vw); }
        }

        @media (max-width: 768px) {
            .login-box { max-width: 85vw; padding: 5vw; }
            .login-box h2 { font-size: 4vw; }
            .login-box p { font-size: 2.8vw; }
            .login-box input { font-size: 3vw; padding: 2.5vw; }
            .login-box button { font-size: 3vw; padding: 2.5vw; }
            .login-message { font-size: 2.6vw; }
        }

        footer {
            text-align: center;
            padding: 1.5vw;
            color: #888;
            font-size: 0.9vw;
        }

        @media (max-width: 768px) {
            body { font-size: 3vw; }
            header h1 { font-size: 4.5vw; }
            header p { font-size: 2.5vw; }
            .exam-info { width: 90vw; padding: 4vw; }
            .exam-info h2 { font-size: 4vw; }
            .exam-info p { font-size: 2.8vw; }
            .exam-buttons { width: 90vw; flex-direction: column; }
            .exam-btn { min-width: unset; padding: 6vw 3vw; font-size: 3.5vw; }
            .exam-btn i { font-size: 7vw; }
            .exam-btn span.sub { font-size: 2.4vw; }
            footer { font-size: 2.2vw; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-graduation-cap"></i> مرکز آموزشی خوارزمی</h1>
            <p>پلتفرم آزمون‌های آنلاین</p>
        </header>

        <div id="login-container" class="login-container">
            <div class="login-box">
                <h2><i class="fas fa-lock"></i> ورود به سیستم</h2>
                <p>لطفاً رمز عبور را برای دسترسی به آزمون‌ها وارد کنید:</p>
                <input type="password" id="password-input" placeholder="رمز عبور" autocomplete="off">
                <button id="login-btn" onclick="checkPassword()"><i class="fas fa-sign-in-alt"></i> ورود</button>
                <p id="login-message" class="login-message"></p>
            </div>
        </div>

        <div class="main-menu" id="main-menu" style="display: none;">
            <div class="exam-info">
                <h2><i class="fas fa-clipboard-list"></i> انتخاب آزمون</h2>
                <p>یکی از آزمون‌های زیر را برای شروع انتخاب کنید</p>
            </div>

            <div class="exam-buttons">
                <a class="exam-btn icdl-btn" href="https://say4s.github.io/qizICDL/" target="_blank" rel="noopener noreferrer">
                    <i class="fas fa-laptop-code"></i>
                    آزمون ICDL
                    <span class="sub">شروع آزمون مهارت‌های رایانه</span>
                </a>

                <a class="exam-btn diplom-btn" href="dip.html" target="_blank" rel="noopener noreferrer">
                    <i class="fas fa-user-graduate"></i>
                    آزمون دیپلم
                    <span class="sub">شروع آزمون دیپلم</span>
                </a>
            </div>
        </div>

        <footer>
            &copy; مرکز آموزشی خوارزمی
        </footer>
    </div>

    <script>
        let correctPassword = null;

        // خواندن رمز عبور از فایل pass.txt
        fetch('pass.txt', { cache: 'no-store' })
            .then(response => {
                if (!response.ok) throw new Error('فایل رمز عبور یافت نشد');
                return response.text();
            })
            .then(text => {
                correctPassword = text.trim();
            })
            .catch(error => {
                console.error('خطا در خواندن pass.txt:', error);
                document.getElementById('login-message').textContent = '❌ خطا در بارگذاری تنظیمات. با مدیر سایت تماس بگیرید.';
                document.getElementById('login-message').style.color = 'var(--danger-color)';
            });

        function checkPassword() {
            const input = document.getElementById('password-input');
            const messageElement = document.getElementById('login-message');

            if (correctPassword === null) {
                messageElement.textContent = '⏳ در حال بارگذاری تنظیمات، چند لحظه صبر کنید...';
                messageElement.style.color = 'var(--primary-color)';
                return;
            }

            if (input.value === correctPassword) {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('main-menu').style.display = 'flex';
            } else {
                messageElement.textContent = '❌ رمز عبور اشتباه است';
                messageElement.style.color = 'var(--danger-color)';

                const loginBox = document.querySelector('.login-box');
                loginBox.style.animation = 'shake 0.5s';
                setTimeout(() => loginBox.style.animation = '', 500);
                input.value = '';
                input.focus();
            }
        }

        document.getElementById('password-input').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                checkPassword();
            }
        });

        document.getElementById('password-input').focus();
    </script>
</body>
</html>
